<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        cursor: pointer;
        font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
      }
      .layer {
        position: fixed;
        inset: 0;
        background: rgba(58, 109, 240, 0.18);
        border: 3px solid #3a6df0;
        box-sizing: border-box;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .layer__label {
        padding: 10px 18px;
        background: #3a6df0;
        color: #fff;
        font-size: 15px;
        font-weight: 600;
        border-radius: 8px;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.35);
        animation: fadeIn 0.15s ease-out;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(-4px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .layer:hover { background: rgba(58, 109, 240, 0.28); }
    </style>
  </head>
  <body>
    <div class="layer">
      <span class="layer__label">이 창으로 결정</span>
    </div>
    <script>
      const key = new URLSearchParams(location.search).get('key');
      document.body.addEventListener('click', () => {
        if (key) window.picker.pick(key);
      });
    </script>
  </body>
</html>
