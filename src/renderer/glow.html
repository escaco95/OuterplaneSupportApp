<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <style>
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
        font-family: "Segoe UI Variable", "Segoe UI", system-ui, sans-serif;
      }
      .glow {
        position: fixed;
        top: 24px;
        left: 24px;
        right: 24px;
        bottom: 24px;
        border-radius: 2px;
        box-shadow:
          0 0 8px rgba(58, 109, 240, 0.95),
          0 0 18px rgba(58, 109, 240, 0.65),
          0 0 32px rgba(58, 109, 240, 0.35);
        pointer-events: none;
        animation: breathe 2.4s ease-in-out infinite;
      }
      .glow.is-error {
        box-shadow:
          0 0 10px rgba(230, 57, 70, 1),
          0 0 22px rgba(230, 57, 70, 0.75),
          0 0 40px rgba(230, 57, 70, 0.45);
        animation: none;
      }
      @keyframes breathe {
        0%, 100% { opacity: 0.85; }
        50% { opacity: 1; }
      }
      .reason {
        position: fixed;
        top: 24px;
        left: 24px;
        right: 24px;
        bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
        box-sizing: border-box;
        color: rgba(255, 255, 255, 0.78);
        font-size: 26px;
        font-weight: 600;
        line-height: 1.4;
        text-align: center;
        white-space: pre-line;
        text-shadow:
          0 0 12px rgba(0, 0, 0, 0.95),
          0 2px 6px rgba(0, 0, 0, 0.9);
        pointer-events: none;
      }
      .reason[hidden] { display: none; }
    </style>
  </head>
  <body>
    <div class="glow" id="glow"></div>
    <div class="reason" id="reason" hidden></div>
    <script>
      const glowEl = document.getElementById('glow');
      const reasonEl = document.getElementById('reason');
      window.glow.onState((state) => {
        if (state.ok) {
          glowEl.classList.remove('is-error');
          reasonEl.hidden = true;
          reasonEl.textContent = '';
        } else {
          glowEl.classList.add('is-error');
          reasonEl.textContent = state.reason || '';
          reasonEl.hidden = false;
        }
      });
    </script>
  </body>
</html>
